version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group the noise: one PR for all minor/patch bumps, majors stay separate
    # so they get their own review (and their own beta soak).
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Frameworks we upgrade deliberately on the quarterly window, not weekly.
    # Dependabot still surfaces majors as their own PRs; these stay separate.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@clerk/nextjs"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
